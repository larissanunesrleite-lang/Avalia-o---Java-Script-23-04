<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Inteligente de Produtos</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <header>
        <h2>Catálogo de Produtos</h2>
    </header>

    <main>

        <section>
            <img src="baner.png" alt="Banner do catálogo de produtos" id="status">
        </section>

        <section>
            <form name="frmProdutos">
                <label for="produto">Escolha um produto:</label>

                <select id="produto">
                    <option value="">Selecione...</option>
                    <option value="Kit Pincel de Maquiagem">Kit Pincel de Maquigem</option>
                    <option value="Blush">Blush</option>
                    <option value="Rimel">Rimel</option>
                </select>

                <br><br>

                <input type="button" value="Buscar" onclick="buscarProduto()">
                <input type="button" value="Limpar" onclick="limparBusca()">
            </form>
        </section>

        <section>
            <div id="resultado" style="margin-top: 20px; text-align: center;"></div>
        </section>

    </main>

    <footer style="text-align: center; margin-top: 30px;">
        <p>© 2026 Larissa Nunes - Catálogo de Produtos</p>
    </footer>

    <script src="main.js"></script>

</body>
</html>
